<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>应用市场关闭通知</title>
  <style>
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #d9534f;
    }
    p {
      line-height: 1.6;
      margin: 15px 0;
    }
    .footer {
      margin-top: 30px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>应用市场关闭通知</h1>
    <p>亲爱的用户：</p>
    <p>由于服务器到期，本应用市场已于近期关闭。感谢大家一直以来的支持与使用。</p>
    <p>本应用市场提供的所有应用均为 <strong>自制免费应用</strong>。因服务器维护成本原因，暂时无法继续提供服务。</p>
    <p>未来如有新的计划或重新上线，我们将第一时间告知。</p>
    <div class="footer">—— 应用市场团队</div>
  </div>
</body>
</html>
