<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>次放应用市场关闭通知</title>
  <style>
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 90%;
      margin: 40px auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #d9534f;
      font-size: 1.6em;
      margin-bottom: 20px;
    }
    p {
      line-height: 1.6;
      margin: 12px 0;
      font-size: 1em;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.9em;
      color: #777;
    }
    .link {
      margin-top: 20px;
      font-size: 1em;
    }
    .link a {
      color: #337ab7;
      text-decoration: none;
      font-weight: bold;
    }
    .link a:hover {
      text-decoration: underline;
    }
    @media (min-width: 768px) {
      .container {
        max-width: 600px;
        padding: 30px;
      }
      h1 {
        font-size: 2em;
      }
      p {
        font-size: 1.1em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>应用市场关闭通知</h1>
    <p>亲爱的用户：</p>
    <p>由于服务器到期，本应用市场已于近期关闭。感谢大家一直以来的支持与使用。</p>
    <p>本应用市场提供的所有应用均为 <strong>自制免费应用 </strong>或 <strong>整理破解应用</strong>。因服务器维护成本原因，暂时无法继续提供服务。</p>
    <p>未来如有新的计划或重新上线，我们将第一时间告知。</p>
    <div class="link">
      我们已开放了纪念版应用商店，<a href="https://app.store.waterchisato.top/apk">点击前往</a>
    </div>
    <div class="footer">—— 水喝千束、次放应用市场团队</div>
  </div>
</body>
</html>
